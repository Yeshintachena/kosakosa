<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Buku Saku Digital kosakata Mandarin-Indonesia QC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="floating-logos home-only">
    <a href="https://vokasi.uns.ac.id" target="_blank">
      <img src="LOGO BARU SEKOLAH VOKASI.png" alt="Logo UNS">
    </a>
    <a href="https://uns.ac.id" target="_blank">
      <img src="1000014489.png" alt="Logo 2">
    </a>
    <a href="https://www.donlim.com" target="_blank">
      <img src="1000009464.png" alt="Logo Donlim">
    </a>
  </div>
  </a>
  <header class="header">
    <div class="header-text">
      <h1>Buku Kosakata Digital</h1>
      <h2>Mandarin – Indonesia</h2>
      <p>>注塑项目部词汇</p>
      <p> Quality Control Injeksi</p>
      <p class="author">PT Donlim Technology Indonesia</p>
      <p class="author">Disusun oleh: Yeshinta Happy 叶昕悦</p>
    </div>
  </header>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="nav-container">
      <div class="menu-toggle" onclick="toggleMenu(this)">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="nav-links" id="navLinks">
        <button onclick="showSection('home')"> Beranda</button>
        <button onclick="showSection('kamus')"> Kosakata</button>
        <button onclick="showSection('quiz')"> Quiz</button>
      </div>
    </div>
  </nav>
  <!-- SECTION HOME -->
  <section id="home" class="section">
    <div class="bg-top home-only"></div>
    <div class="bg-bottom home-only"></div>
  </section>

  <!-- SECTION KAMUS -->
  <section id="kamus" class="section">
    <div class="kamus-top">
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Cari Indonesia / Mandarin / Pinyin...">
        <span class="search-icon">🔍</span>
      </div>
      
      <div class="tabs">
        <button class="tab-btn active" onclick="setCategory('all', this)">Semua</button>
        <button class="tab-btn" onclick="setCategory('umum', this)">Kosakata Umum</button>
        <button class="tab-btn" onclick="setCategory('cacat produk', this)">Kosakata Cacat Produk</button>
        <button class="tab-btn" onclick="setCategory('peralatan perbaikan', this)">Kosakata Peralatan Perbaikan</button>
        <button class="tab-btn" id="favorites-tab" onclick="showFavorites()">⭐ Favorit</button>
      </div>
    </div>
    <div id="vocab-list" class="list"></div>
  </section>
  <!-- SECTION QUIZ -->
<section id="quiz" class="section">
  <div class="quiz-container">
    <div class="quiz-card">
      <div class="quiz-header">
        <span>Jumlah kosakata</span>
        <span id="quiz-progress-text">1/241</span>
      </div>
      
      <!-- PROGRESS SEDERHANA -->
      <div class="quiz-progress-container">
        <div class="quiz-progress-info">
          <div class="quiz-progress-stats">
            <div class="quiz-stat-item">
              <span class="quiz-stat-icon">✅</span>
              <span class="quiz-stat-label">Benar:</span>
              <span class="quiz-stat-value" id="quiz-correct-count">0</span>
            </div>
            <div class="quiz-stat-item">
              <span class="quiz-stat-icon">❌</span>
              <span class="quiz-stat-label">Salah:</span>
              <span class="quiz-stat-value" id="quiz-wrong-count">0</span>
            </div>
          </div>
        </div>
      </div>

      <h2 id="quiz-question">Memuat soal...</h2>
      
      <div id="quiz-options" class="quiz-options"></div>
      <div id="quiz-feedback" class="quiz-feedback"></div>

      <div class="quiz-buttons">
        <button onclick="showAnswer()" class="btn-outline">🔍 Lihat Jawaban</button>
        <button onclick="skipQuiz()" class="btn-secondary">⏩ Lewati</button>
      </div>
    </div>
  </div>
</section>
  <script src="script.js"></script>
</body>
</html>
